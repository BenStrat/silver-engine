<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Silver Widget</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f6f1;
        --panel: rgba(255, 255, 255, 0.82);
        --text: #10212f;
        --muted: #51606f;
        --accent: #0f766e;
        --accent-strong: #134e4a;
        --border: rgba(16, 33, 47, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 28%),
          radial-gradient(circle at bottom right, rgba(19, 78, 74, 0.12), transparent 26%),
          var(--bg);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .card {
        width: min(42rem, 100%);
        padding: clamp(1.5rem, 4vw, 2.5rem);
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(16, 33, 47, 0.12);
        backdrop-filter: blur(14px);
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.8rem;
        color: var(--accent-strong);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.2rem, 5vw, 3.8rem);
        line-height: 0.98;
      }

      p {
        margin: 0 0 1.25rem;
        max-width: 34rem;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .button,
      .ghost {
        appearance: none;
        border: 0;
        border-radius: 999px;
        font: inherit;
        padding: 0.9rem 1.2rem;
        cursor: pointer;
        text-decoration: none;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .button {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: white;
        box-shadow: 0 12px 30px rgba(15, 118, 110, 0.28);
      }

      .ghost {
        background: white;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .button:hover,
      .ghost:hover {
        transform: translateY(-1px);
      }

      .embed {
        margin-top: 1.5rem;
        padding: 1rem 1.1rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--border);
        overflow-x: auto;
        font-size: 0.92rem;
        line-height: 1.5;
      }

      code {
        font-family: "SFMono-Regular", Consolas, monospace;
      }
    </style>
    <script src="/widget.js" defer></script>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="eyebrow">Embeddable widget</p>
        <h1>Silver Widget</h1>
        <p>
          This placeholder ships the smallest possible embeddable experience:
          a launcher button, a modal shell, and a script you can drop into any
          page while the real capture flow is built.
        </p>
        <div class="actions">
          <button class="button" type="button" data-silver-widget-open>
            Open widget
          </button>
          <a class="ghost" href="/widget.js" target="_blank" rel="noreferrer">
            View script
          </a>
        </div>
        <pre class="embed"><code>&lt;script src="https://YOUR_DOMAIN/widget.js" defer&gt;&lt;/script&gt;</code></pre>
      </section>
    </main>
  </body>
</html>
