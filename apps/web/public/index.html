<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Silver Engine Web</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(14, 165, 233, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.08), transparent 28%),
          linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      main {
        width: min(40rem, calc(100% - 2rem));
        padding: clamp(1.5rem, 4vw, 3rem);
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        border: 1px solid rgba(148, 163, 184, 0.28);
        backdrop-filter: blur(16px);
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.75rem;
        font-weight: 700;
        color: #0369a1;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.2rem, 5vw, 4rem);
        line-height: 0.98;
      }

      p {
        margin: 0 0 1rem;
        max-width: 34rem;
        line-height: 1.65;
        color: #334155;
      }

      .card {
        margin-top: 1.5rem;
        padding: 1rem 1.15rem;
        border-radius: 1rem;
        background: #f8fafc;
        border: 1px solid #cbd5e1;
      }

      code {
        padding: 0.15rem 0.35rem;
        border-radius: 0.35rem;
        background: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Internal dashboard</p>
      <h1>Silver Engine Web</h1>
      <p>
        This is the monorepo's triage dashboard shell. The full product UI will
        live here, but for now the app is a static Vercel placeholder that
        deploys cleanly on its own.
      </p>
      <div class="card">
        <p>
          Connected app: <code>@silver/web</code>
        </p>
      </div>
    </main>
  </body>
</html>
